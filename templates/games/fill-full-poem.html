<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>默写诗词 · 诗境测验</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
            min-height: 100vh;
        }
        .card {
            max-width: 860px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 16px 40px rgba(0, 20, 40, 0.08);
            padding: 2rem 2rem 2.5rem;
            transition: 0.2s;
        }
        h1 {
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: -0.02em;
            color: #0b1e33;
            margin: 0 0 0.2rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        h1 i {
            color: #b45f3a;
        }
        .subhead {
            color: #3a4f64;
            margin-bottom: 2rem;
            border-left: 4px solid #c9b8a8;
            padding-left: 1rem;
            font-size: 0.95rem;
            background: #f1f5f9;
            border-radius: 0 14px 14px 0;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .subhead i {
            color: #8b6f54;
        }
        .poem-panel {
            background: #fcf9f5;
            border: 1px solid #e6ded6;
            border-radius: 28px;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        .poem-title {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            color: #2e3f4f;
            border-bottom: 2px dashed #dacfc4;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .poem-title small {
            font-weight: 300;
            font-size: 0.9rem;
            color: #7e6b5a;
        }
        .poem-lines {
            font-size: 1.2rem;
            line-height: 2.2rem;
            color: #1d2b38;
            padding: 0.2rem 0.2rem;
        }
        .poem-lines .line {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid #f0e8e0;
        }
        .poem-lines .line:last-child {
            border-bottom: none;
        }
        .line-number {
            font-size: 0.7rem;
            color: #aa9b8c;
            min-width: 2rem;
            font-weight: 300;
        }
        .line-content {
            flex: 1;
            padding: 0.2rem 0.4rem;
            border-radius: 8px;
            transition: 0.1s;
        }
        .input-line {
            background: transparent;
            border: none;
            border-bottom: 2px solid #d6c9bc;
            font-size: 1.2rem;
            padding: 0.1rem 0.3rem;
            width: 100%;
            font-family: inherit;
            color: #1d2b38;
            transition: 0.15s;
        }
        .input-line:focus {
            outline: none;
            border-bottom-color: #7f6b58;
            background: #fcf7f0;
            border-radius: 4px 4px 0 0;
        }
        .input-line::placeholder {
            color: #bfb2a3;
            font-weight: 300;
            font-size: 0.95rem;
        }
        .line-correct {
            background: #e3f0e3;
            border-radius: 6px;
            padding: 0 0.4rem;
        }
        .line-wrong {
            background: #f7e6e6;
            border-radius: 6px;
            padding: 0 0.4rem;
        }
        .hint-tag {
            background: #e7eef6;
            border-radius: 30px;
            padding: 0.2rem 0.9rem;
            font-size: 0.7rem;
            color: #4f5f6e;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 1.8rem 0 0.8rem;
            gap: 0.8rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #eef3f9;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1f3b57;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #2f4a62;
            color: white;
            box-shadow: 0 4px 10px rgba(40, 65, 90, 0.15);
        }
        .btn-primary:hover {
            background: #1d354a;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #d3c9be;
        }
        .btn-outline:hover {
            background: #f0ebe5;
            border-color: #b8a99a;
        }
        .btn-success {
            background: #3a6b4f;
            color: white;
        }
        .btn-success:hover {
            background: #2a553d;
        }
        .btn-warning {
            background: #b88c6b;
            color: white;
        }
        .btn-warning:hover {
            background: #9e7659;
        }
        .score-badge {
            background: #e8eef3;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #1d3345;
        }
        .footer-info {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #7d8fa2;
            text-align: center;
            border-top: 1px solid #e2eaf2;
            padding-top: 1.2rem;
        }
        .footer-info i {
            margin: 0 6px;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem 0.8rem;
        }
        .result-message {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            background: #eef3f9;
            color: #1d3345;
        }
        .placeholder-message {
            padding: 1.5rem;
            text-align: center;
            color: #7b8fa3;
            background: #f4f8fd;
            border-radius: 40px;
        }
        .return-link {
            text-decoration: none;
            color: #4b6a8a;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .return-link:hover {
            color: #1f3b57;
        }
        .relative-wrap {
            position: relative;
        }
        .inline-icon {
            margin-right: 4px;
        }
        @media (max-width: 550px) {
            .card { padding: 1.5rem; }
            .poem-panel { padding: 1rem; }
            .poem-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <!-- 标题 & 返回 -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap;">
        <h1>
            <i class="fas fa-feather-alt"></i> 
            <span id="poemTitle">默写 · 静夜思</span>
        </h1>
        <a href="/" class="return-link" style="margin-top: 0.4rem;">
            <i class="fas fa-arrow-left"></i> 返回诗库
        </a>
    </div>

    <div class="subhead">
        <i class="fas fa-pen-fancy"></i> 
        在下方输入框中默写每一句。点击「检查」查看正误，<i class="fas fa-lightbulb" style="color: #b88c6b;"></i> 提示可显示首字。
    </div>

    <!-- 诗词默写区域 -->
    <div class="poem-panel" id="poemPanel">
        <div class="poem-title">
            <span id="poemName">静夜思</span>
            <small id="poemAuthor">李白 · 唐</small>
        </div>
        <div class="poem-lines" id="linesContainer">
            <!-- 由 JS 动态渲染 -->
        </div>
    </div>

    <!-- 控制栏 -->
    <div class="action-bar">
        <div class="flex-row">
            <button type="button" class="btn btn-outline" id="checkBtn">
                <i class="fas fa-check-circle"></i> 检查
            </button>
            <button type="button" class="btn btn-outline" id="hintBtn">
                <i class="fas fa-lightbulb"></i> 提示
            </button>
            <button type="button" class="btn btn-outline" id="resetBtn">
                <i class="fas fa-undo-alt"></i> 重置
            </button>
            <button type="button" class="btn btn-warning" id="randomPoemBtn">
                <i class="fas fa-shuffle"></i> 随机诗
            </button>
        </div>
        <span class="score-badge" id="scoreDisplay">
            <i class="fas fa-star"></i> <span id="scoreCount">0/0</span>
        </span>
    </div>

    <!-- 结果消息 -->
    <div id="resultMessage" class="result-message" style="margin-top: 0.8rem; display: none;"></div>

    <div class="footer-info">
        <i class="fas fa-arrow-right"></i> 
        点击 <strong>提示</strong> 显示每句首字，<strong>检查</strong> 比对整句。
        <span class="hint-tag"><i class="far fa-clock"></i> 经典诗词</span>
    </div>
</div>

<script>
    (function() {

        // 当前状态
        let currentPoem = null;          // { title, author, lines }
        let userAnswers = [];           // 字符串数组
        let hintActive = false;         // 是否显示首字提示
        let checkedStatus = [];         // boolean[] 每句是否正确 (仅检查后)

        // DOM 元素
        const linesContainer = document.getElementById('linesContainer');
        const poemName = document.getElementById('poemName');
        const poemAuthor = document.getElementById('poemAuthor');
        const poemTitle = document.getElementById('poemTitle');
        const scoreCount = document.getElementById('scoreCount');
        const resultMessage = document.getElementById('resultMessage');

        POEM_LIBRARY = {{ poems | tojson }};
        // ---------- 辅助 ----------
        function getFirstChar(line) {
            return line.charAt(0);
        }

        // 渲染当前诗词
        function renderPoem() {
            if (!currentPoem) {
                linesContainer.innerHTML = `<div class="placeholder-message"><i class="fas fa-book-open"></i> 请选择诗词</div>`;
                return;
            }
            const lines = currentPoem.lines;
            // 重置状态
            userAnswers = lines.map(() => '');
            checkedStatus = lines.map(() => false);
            hintActive = false;

            let html = '';
            lines.forEach((line, idx) => {
                const lineNum = idx + 1;
                const hintChar = hintActive ? getFirstChar(line) : '';
                const placeholder = hintActive ? `首字: ${hintChar} ...` : '输入诗句';
                html += `
                    <div class="line" data-index="${idx}">
                        <span class="line-number">${lineNum}.</span>
                        <span class="line-content" id="lineContent-${idx}">
                            <input type="text" class="input-line" 
                                   id="inputLine-${idx}" 
                                   data-index="${idx}"
                                   value="${userAnswers[idx] || ''}"
                                   placeholder="${placeholder}"
                                   spellcheck="false">
                        </span>
                        <span id="statusIcon-${idx}" style="font-size:0.9rem; min-width:1.6rem;"></span>
                    </div>
                `;
            });
            linesContainer.innerHTML = html;

            // 绑定 input 事件，实时更新 userAnswers
            document.querySelectorAll('.input-line').forEach(inp => {
                const idx = parseInt(inp.dataset.index, 10);
                inp.addEventListener('input', function(e) {
                    userAnswers[idx] = this.value;
                    // 如果已经检查过，清除状态图标（因为用户修改了）
                    if (checkedStatus[idx]) {
                        checkedStatus[idx] = false;
                        const icon = document.getElementById(`statusIcon-${idx}`);
                        if (icon) icon.innerHTML = '';
                        updateScore();
                    }
                    // 隐藏结果消息
                    resultMessage.style.display = 'none';
                });
            });

            // 更新标题
            poemName.textContent = currentPoem.data.title;
            poemAuthor.textContent = currentPoem.data.author;
            poemTitle.textContent = `默写 · ${currentPoem.data.title}`;
            // 重置分数显示
            updateScore();
            resultMessage.style.display = 'none';
        }

        // 更新分数
        function updateScore() {
            const lines = currentPoem.word.split(/[\n(\,\s*)(，\s*)]/).filter(l => l.trim().length > 0);
            const total = lines.length;
            const correct = checkedStatus.filter(v => v === true).length;
            scoreCount.textContent = `${correct}/${total}`;
        }

        // 检查答案
        function checkAnswers() {
            if (!currentPoem) return;
            const lines = currentPoem.lines;
            let correctCount = 0;
            let allCorrect = true;
            lines.forEach((line, idx) => {
                const input = document.getElementById(`inputLine-${idx}`);
                if (!input) return;
                const userAns = input.value.trim();
                const isCorrect = (userAns === line);
                checkedStatus[idx] = isCorrect;
                if (isCorrect) correctCount++;
                else allCorrect = false;

                // 更新状态图标
                const icon = document.getElementById(`statusIcon-${idx}`);
                if (icon) {
                    if (isCorrect) {
                        icon.innerHTML = '<i class="fas fa-check-circle" style="color: #3a7b4a;"></i>';
                    } else {
                        icon.innerHTML = '<i class="fas fa-times-circle" style="color: #b15353;"></i>';
                    }
                }
                // 高亮边框提示 (视觉)
                const content = document.getElementById(`lineContent-${idx}`);
                if (content) {
                    content.classList.remove('line-correct', 'line-wrong');
                    if (isCorrect) content.classList.add('line-correct');
                    else if (userAns.length > 0) content.classList.add('line-wrong'); // 有输入但错误
                }
            });
            updateScore();

            // 显示结果消息
            if (allCorrect && correctCount === lines.length) {
                resultMessage.innerHTML = `<i class="fas fa-crown" style="color: #b88c6b;"></i> 太棒了！全部默写正确！`;
                resultMessage.style.display = 'block';
                resultMessage.style.background = '#e3f0e3';
                resultMessage.style.color = '#1d4a2e';
            } else {
                const wrongCount = lines.length - correctCount;
                resultMessage.innerHTML = `<i class="fas fa-pen"></i> 正确 ${correctCount} 句，错误 ${wrongCount} 句。继续加油！`;
                resultMessage.style.display = 'block';
                resultMessage.style.background = '#fcf2e8';
                resultMessage.style.color = '#5f4a36';
            }
        }

        // 重置输入 (清空所有输入，清除状态)
        function resetPoem() {
            if (!currentPoem) return;
            const lines = currentPoem.lines;
            userAnswers = lines.map(() => '');
            checkedStatus = lines.map(() => false);
            hintActive = false;
            // 重新渲染 (保持干净)
            renderPoem();
            resultMessage.style.display = 'none';
        }

        // 提示：显示首字
        function toggleHint() {
            if (!currentPoem) return;
            hintActive = !hintActive;
            // 重新渲染所有输入框，保留用户已输入内容 (但需要保留现有输入)
            // 更简单：重新渲染，但保留 userAnswers 内容
            const lines = currentPoem.lines;
            // 保存当前用户输入 (从DOM读取)
            document.querySelectorAll('.input-line').forEach(inp => {
                const idx = parseInt(inp.dataset.index, 10);
                if (!isNaN(idx)) {
                    userAnswers[idx] = inp.value;
                }
            });
            // 重新渲染
            renderPoemWithHint();
            // 恢复输入值
            document.querySelectorAll('.input-line').forEach(inp => {
                const idx = parseInt(inp.dataset.index, 10);
                if (!isNaN(idx) && userAnswers[idx] !== undefined) {
                    inp.value = userAnswers[idx];
                }
            });
            // 如果已经检查过，保留状态图标？但我们重新渲染清除状态，因此需要重新检查？
            // 为了不丢失检查状态，可以重新应用 checkedStatus
            // 但为了简单，重置检查状态，因为提示后通常重新检查
            checkedStatus = lines.map(() => false);
            updateScore();
            // 清除图标
            document.querySelectorAll('[id^="statusIcon-"]').forEach(el => el.innerHTML = '');
            resultMessage.style.display = 'none';
        }

        // 带提示的渲染 (内部使用 hintActive)
        function renderPoemWithHint() {
            if (!currentPoem) return;
            const lines = currentPoem.lines;
            let html = '';
            lines.forEach((line, idx) => {
                const lineNum = idx + 1;
                const hintChar = hintActive ? getFirstChar(line) : '';
                const placeholder = hintActive ? `首字: ${hintChar} ...` : '输入诗句';
                const val = userAnswers[idx] || '';
                html += `
                    <div class="line" data-index="${idx}">
                        <span class="line-number">${lineNum}.</span>
                        <span class="line-content" id="lineContent-${idx}">
                            <input type="text" class="input-line" 
                                   id="inputLine-${idx}" 
                                   data-index="${idx}"
                                   value="${val.replace(/"/g, '&quot;')}"
                                   placeholder="${placeholder}"
                                   spellcheck="false">
                        </span>
                        <span id="statusIcon-${idx}" style="font-size:0.9rem; min-width:1.6rem;"></span>
                    </div>
                `;
            });
            linesContainer.innerHTML = html;

            // 重新绑定事件
            document.querySelectorAll('.input-line').forEach(inp => {
                const idx = parseInt(inp.dataset.index, 10);
                inp.addEventListener('input', function(e) {
                    userAnswers[idx] = this.value;
                    if (checkedStatus[idx]) {
                        checkedStatus[idx] = false;
                        const icon = document.getElementById(`statusIcon-${idx}`);
                        if (icon) icon.innerHTML = '';
                        updateScore();
                    }
                    resultMessage.style.display = 'none';
                });
            });
            // 更新标题 (不变)
            updateScore();
        }

        // 随机选择诗词
        function loadRandomPoem() {
            const idx = Math.floor(Math.random() * POEM_LIBRARY.length);
            currentPoem = { ...POEM_LIBRARY[idx] };
            // 重置所有状态
            
            const lines = currentPoem.word.split(/[\n(\,\s*)(，\s*)]/).filter(l => l.trim().length > 0);
            currentPoem.lines = lines;

            userAnswers = currentPoem.lines.map(() => '');
            checkedStatus = currentPoem.lines.map(() => false);
            hintActive = false;
            renderPoem();
            resultMessage.style.display = 'none';
        }

        // 初始化加载 (默认第一首)
        function init() {
            // 加载第一首
            currentPoem = { ...POEM_LIBRARY[0] };
            
            const lines = currentPoem.word.split(/[\n(\,\s*)(，\s*)]/).filter(l => l.trim().length > 0);
            currentPoem.lines = lines;

            renderPoem();
            // 事件绑定
            document.getElementById('checkBtn').addEventListener('click', checkAnswers);
            document.getElementById('hintBtn').addEventListener('click', toggleHint);
            document.getElementById('resetBtn').addEventListener('click', resetPoem);
            document.getElementById('randomPoemBtn').addEventListener('click', loadRandomPoem);
            // 额外: 回车键触发检查
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.classList.contains('input-line')) {
                    e.preventDefault();
                    checkAnswers();
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
